# 开发模式覆盖配置 - 热重载
# 使用方法: docker compose -f docker/docker-compose.build.yml -f docker/docker-compose.dev.yml up -d --build

services:
  aiclient-api:
    build:
      context: ..
      dockerfile: Dockerfile
    volumes:
      - ../configs:/app/configs
      - ../packages/node-proxy/src:/app/packages/node-proxy/src:ro
      - ../packages/node-proxy/package.json:/app/packages/node-proxy/package.json:ro
    command: ["sh", "-c", "node --watch packages/node-proxy/src/core/master.js $ARGS"]
