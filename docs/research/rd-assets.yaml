  - name: "tls-sidecar"
    path: "packages/node-proxy/src/utils/tls-sidecar.js"
  - name: "token-utils"
    path: "packages/node-proxy/src/utils/token-utils.js"
  - name: "proxy-utils"
    path: "packages/node-proxy/src/utils/proxy-utils.js"
  - name: "provider-strategy"
    path: "packages/node-proxy/src/utils/provider-strategy.js"
  - name: "grok-assets-proxy"
    path: "packages/node-proxy/src/utils/grok-assets-proxy.js"

services:
  - name: "api-server"
    path: "packages/node-proxy/src/services/api-server.js"
  - name: "api-manager"
    path: "packages/node-proxy/src/services/api-manager.js"
  - name: "service-manager"
    path: "packages/node-proxy/src/services/service-manager.js"
  - name: "ui-manager"
    path: "packages/node-proxy/src/services/ui-manager.js"
  - name: "usage-service"
    path: "packages/node-proxy/src/services/usage-service.js"

sidecar:
  - name: "go-tls-sidecar"
    path: "packages/go-sidecar/main.go"
