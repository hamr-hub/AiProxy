metadata:
  rd_asset_review_version: "0.4.7"
  generated_at: "2026-04-17T15:29:00+08:00"
  scan_mode: "full"
  platform: "node"

project:
  name: "AiProxy"
  type: "node"
  framework: "custom-http-server"
  language: "javascript"
  package_manager: "pnpm"
  monorepo: true

providers:
  - name: "GeminiApiService"
    constant: "gemini-cli-oauth"
    path: "packages/node-proxy/src/providers/gemini/gemini-core.js"
    auth: "oauth2"
  - name: "AntigravityApiService"
    constant: "gemini-antigravity"
    path: "packages/node-proxy/src/providers/gemini/antigravity-core.js"
    auth: "cookie"
  - name: "ClaudeApiService"
    constant: "claude-custom"
    path: "packages/node-proxy/src/providers/claude/claude-core.js"
    auth: "api-key"
  - name: "KiroApiService"
    constant: "claude-kiro-oauth"
    path: "packages/node-proxy/src/providers/claude/claude-kiro.js"
    auth: "oauth2"
  - name: "OpenAIApiService"
    constant: "openai-custom"
    path: "packages/node-proxy/src/providers/openai/openai-core.js"
    auth: "api-key"
  - name: "OpenAIResponsesApiService"
    constant: "openaiResponses-custom"
    path: "packages/node-proxy/src/providers/openai/openai-responses-core.js"
    auth: "api-key"
  - name: "CodexApiService"
    constant: "openai-codex-oauth"
    path: "packages/node-proxy/src/providers/openai/codex-core.js"
    auth: "oauth2"
  - name: "QwenApiService"
    constant: "openai-qwen-oauth"
    path: "packages/node-proxy/src/providers/openai/qwen-core.js"
    auth: "oauth2"
  - name: "IFlowApiService"
    constant: "openai-iflow"
    path: "packages/node-proxy/src/providers/openai/iflow-core.js"
    auth: "oauth2"
  - name: "GrokApiService"
    constant: "grok-custom"
    path: "packages/node-proxy/src/providers/grok/grok-core.js"
    auth: "cookie"
  - name: "ForwardApiService"
    constant: "forward-api"
    path: "packages/node-proxy/src/providers/forward/forward-core.js"
    auth: "api-key"
  - name: "LocalApiService"
    constant: "local-model"
    path: "packages/node-proxy/src/providers/local/local-core.js"
    auth: "none"

converters:
  - name: "ClaudeConverter"
    path: "packages/node-proxy/src/converters/strategies/ClaudeConverter.js"
    direction: "Claude → OpenAI"
  - name: "OpenAIConverter"
    path: "packages/node-proxy/src/converters/strategies/OpenAIConverter.js"
    direction: "OpenAI → Claude"
  - name: "GeminiConverter"
    path: "packages/node-proxy/src/converters/strategies/GeminiConverter.js"
    direction: "Gemini → OpenAI"
  - name: "GrokConverter"
    path: "packages/node-proxy/src/converters/strategies/GrokConverter.js"
    direction: "Grok → OpenAI"
  - name: "CodexConverter"
    path: "packages/node-proxy/src/converters/strategies/CodexConverter.js"
    direction: "Codex Responses → OpenAI"
  - name: "OpenAIResponsesConverter"
    path: "packages/node-proxy/src/converters/strategies/OpenAIResponsesConverter.js"
    direction: "OpenAI Responses → Claude"

plugins:
  - name: "default-auth"
    type: "AUTH"
    path: "packages/node-proxy/src/plugins/default-auth/"
  - name: "ai-monitor"
    type: "MIDDLEWARE"
    path: "packages/node-proxy/src/plugins/ai-monitor/"
  - name: "api-potluck"
    type: "MIDDLEWARE"
    path: "packages/node-proxy/src/plugins/api-potluck/"
  - name: "model-usage-stats"
    type: "MIDDLEWARE"
    path: "packages/node-proxy/src/plugins/model-usage-stats/"

