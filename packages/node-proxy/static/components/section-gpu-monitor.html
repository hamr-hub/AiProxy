<link rel="stylesheet" href="components/section-gpu-monitor.css">
<!-- GPU Monitor Section -->
<section id="gpu-monitor" class="section" aria-labelledby="gpu-monitor-title">
    <h2 id="gpu-monitor-title" data-i18n="gpuMonitor.title">GPU监控面板</h2>
    
    <div class="gpu-monitor-container">
        <!-- GPU Status Panel -->
        <div class="gpu-status-panel">
            <div class="panel-header">
                <h3><i class="fas fa-microchip"></i> <span data-i18n="gpuMonitor.gpuStatus">GPU状态</span></h3>
                <button id="refreshGpuStatusBtn" class="btn btn-outline btn-sm" data-i18n-title="common.refresh" title="刷新">
                    <i class="fas fa-sync-alt"></i> <span data-i18n="common.refresh">刷新</span>
                </button>
            </div>
            
            <div id="gpuStatusContent" class="gpu-status-content">
                <div class="status-loading">
                    <i class="fas fa-spinner fa-spin"></i>
                    <span data-i18n="common.loading">加载中...</span>
                </div>
            </div>
        </div>
        
        <!-- GPU Charts Panel -->
        <div class="gpu-charts-panel">
            <div class="panel-header">
                <h3><i class="fas fa-chart-line"></i> <span data-i18n="gpuMonitor.gpuHistory">历史监控</span></h3>
                <div class="chart-tabs">
                    <button class="chart-tab active" data-chart-type="utilization">使用率</button>
                    <button class="chart-tab" data-chart-type="temperature">温度</button>
                    <button class="chart-tab" data-chart-type="memory">显存</button>
                </div>
            </div>
            
            <div id="gpuChartContent" class="gpu-chart-content">
                <canvas id="gpuChart"></canvas>
            </div>
            
            <div class="chart-legend">
                <div class="legend-item">
                    <span class="legend-color utilization"></span>
                    <span>GPU使用率</span>
                </div>
                <div class="legend-item">
                    <span class="legend-color temperature"></span>
                    <span>温度(°C)</span>
                </div>
                <div class="legend-item">
                    <span class="legend-color memory"></span>
                    <span>显存使用率</span>
                </div>
            </div>
        </div>
        
        <!-- Models Status Panel -->
        <div class="models-status-panel">
            <div class="panel-header">
                <h3><i class="fas fa-cubes"></i> <span data-i18n="gpuMonitor.modelStatus">模型状态</span></h3>
            </div>
            
            <div id="modelsStatusContent" class="models-status-content">
                <div class="status-loading">
                    <i class="fas fa-spinner fa-spin"></i>
                    <span data-i18n="common.loading">加载中...</span>
                </div>
            </div>
        </div>
        
        <!-- Queue Status Panel -->
        <div class="queue-status-panel">
            <div class="panel-header">
                <h3><i class="fas fa-list-ol"></i> <span data-i18n="gpuMonitor.queueStatus">队列状态</span></h3>
            </div>
            
            <div id="queueStatusContent" class="queue-status-content">
                <div class="status-loading">
                    <i class="fas fa-spinner fa-spin"></i>
                    <span data-i18n="common.loading">加载中...</span>
                </div>
            </div>
        </div>
        
        <!-- Control Panel -->
        <div class="control-panel">
            <div class="panel-header">
                <h3><i class="fas fa-play"></i> <span data-i18n="gpuMonitor.controls">模型控制</span></h3>
            </div>
            
            <div id="modelControls" class="model-controls">
                <div class="status-loading">
                    <i class="fas fa-spinner fa-spin"></i>
                    <span data-i18n="common.loading">加载中...</span>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Python Controller Integration Area -->
    <div class="controller-integration">
        <div class="panel-header">
            <h3><i class="fas fa-desktop"></i> <span data-i18n="gpuMonitor.controller">AI控制器</span></h3>
            <div class="controller-status">
                <span id="controllerConnectionStatus" class="status-badge offline">
                    <i class="fas fa-circle"></i> <span data-i18n="gpuMonitor.disconnected">未连接</span>
                </span>
            </div>
        </div>
        
        <div class="iframe-container">
            <iframe id="controllerIframe" src="" frameborder="0" allowfullscreen></iframe>
            <div id="iframePlaceholder" class="iframe-placeholder">
                <i class="fas fa-server"></i>
                <p data-i18n="gpuMonitor.iframePlaceholder">AI控制器未启动或配置</p>
                <p class="hint" data-i18n="gpuMonitor.iframeHint">请启动 Python 控制器服务以查看详细监控面板</p>
            </div>
        </div>
    </div>
</section>
