<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API 测试页面</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        .header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }
        .test-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .test-card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .test-card h2 .icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        .test-card h2 .icon.health { background: #10b981; }
        .test-card h2 .icon.auth { background: #3b82f6; }
        .test-card h2 .icon.models { background: #8b5cf6; }
        .test-card h2 .icon.chat { background: #f59e0b; }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #555;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .result {
            margin-top: 20px;
            padding: 16px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 300px;
            overflow-y: auto;
        }
        .result.success {
            background: #ecfdf5;
            color: #059669;
            border: 1px solid #10b981;
        }
        .result.error {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #ef4444;
        }
        .result.loading {
            background: #f3f4f6;
            color: #6b7280;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-left: 10px;
        }
        .status-badge.online {
            background: #dcfce7;
            color: #166534;
        }
        .status-badge.offline {
            background: #fee2e2;
            color: #991b1b;
        }
        .test-results {
            margin-top: 20px;
        }
        .test-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: #f9fafb;
            border-radius: 8px;
            margin-bottom: 8px;
        }
        .test-row.success { border-left: 4px solid #10b981; }
        .test-row.error { border-left: 4px solid #ef4444; }
        .test-row .test-name { font-weight: 500; }
        .test-row .test-status {
            font-size: 0.85rem;
            padding: 4px 10px;
            border-radius: 12px;
        }
        .test-row.success .test-status {
            background: #dcfce7;
            color: #166534;
        }
        .test-row.error .test-status {
            background: #fee2e2;
            color: #991b1b;
        }
        .quick-start {
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .quick-start h3 {
            color: #92400e;
            margin-bottom: 10px;
        }
        .quick-start code {
            display: block;
            background: rgba(0,0,0,0.1);
            padding: 12px;
            border-radius: 6px;
            font-size: 0.9rem;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔌 API 测试页面</h1>
            <p>AIClient2API - 端到端测试控制台</p>
        </div>

        <div class="quick-start">
            <h3>🚀 快速开始</h3>
            <p>使用以下命令测试 API 连接：</p>
            <code>curl http://localhost:3000/health?key=123456</code>
        </div>

        <div class="test-card">
            <h2>
                <span class="icon health">🏥</span>
                健康检查
                <span id="health-status" class="status-badge offline">离线</span>
            </h2>
            <button class="btn btn-primary" onclick="checkHealth()">检查服务器状态</button>
            <div id="health-result" class="result"></div>
        </div>

        <div class="test-card">
            <h2><span class="icon auth">🔐</span> 认证测试</h2>
            <div class="form-group">
                <label for="apiKey">API Key</label>
                <input type="text" id="apiKey" value="123456" placeholder="输入 API Key">
            </div>
            <div class="form-group">
                <label for="authMethod">认证方式</label>
                <select id="authMethod">
                    <option value="bearer">Bearer Token</option>
                    <option value="query">Query Parameter</option>
                    <option value="goog">x-goog-api-key</option>
                    <option value="anthropic">x-api-key (Claude)</option>
                </select>
            </div>
            <button class="btn btn-primary" onclick="testAuth()">测试认证</button>
            <div id="auth-result" class="result"></div>
        </div>

        <div class="test-card">
            <h2><span class="icon models">📦</span> 模型列表</h2>
            <button class="btn btn-primary" onclick="getModels()">获取模型列表</button>
            <div id="models-result" class="result"></div>
        </div>

        <div class="test-card">
            <h2><span class="icon chat">💬</span> 聊天测试</h2>
            <div class="form-group">
                <label for="modelName">模型名称</label>
                <input type="text" id="modelName" value="gpt-4" placeholder="输入模型名称">
            </div>
            <div class="form-group">
                <label for="messageContent">消息内容</label>
                <textarea id="messageContent" placeholder="输入测试消息...">你好，这是一个测试消息。</textarea>
            </div>
            <div class="form-group">
                <label>
                    <input type="checkbox" id="streamMode"> 流式响应
                </label>
            </div>
            <button class="btn btn-primary" onclick="testChat()">发送请求</button>
            <div id="chat-result" class="result"></div>
        </div>

        <div class="test-card">
            <h2><span class="icon health">✅</span> 自动测试套件</h2>
            <button class="btn btn-primary" onclick="runAllTests()">运行所有测试</button>
            <div class="test-results" id="test-results"></div>
        </div>
    </div>

    <script>
        const BASE_URL = window.location.origin;

        async function checkHealth() {
            const resultDiv = document.getElementById('health-result');
            const statusBadge = document.getElementById('health-status');
            
            resultDiv.className = 'result loading';
            resultDiv.textContent = '正在检查...';
            statusBadge.className = 'status-badge offline';
            statusBadge.textContent = '检查中';

            try {
                const response = await fetch(`${BASE_URL}/health`);
                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.className = 'result success';
                    statusBadge.className = 'status-badge online';
                    statusBadge.textContent = '在线';
                } else {
                    resultDiv.className = 'result error';
                    statusBadge.textContent = '异常';
                }
                resultDiv.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                resultDiv.className = 'result error';
                statusBadge.textContent = '离线';
                resultDiv.textContent = `连接失败: ${error.message}`;
            }
        }

        async function testAuth() {
            const apiKey = document.getElementById('apiKey').value;
            const method = document.getElementById('authMethod').value;
            const resultDiv = document.getElementById('auth-result');

            resultDiv.className = 'result loading';
            resultDiv.textContent = '正在测试...';

            try {
                let url = `${BASE_URL}/health`;
                const headers = {};

                switch (method) {
                    case 'bearer':
                        headers['Authorization'] = `Bearer ${apiKey}`;
                        break;
                    case 'query':
                        url += `?key=${apiKey}`;
                        break;
                    case 'goog':
                        headers['x-goog-api-key'] = apiKey;
                        break;
                    case 'anthropic':
                        headers['x-api-key'] = apiKey;
                        break;
                }

                const response = await fetch(url, { headers });
                const data = await response.json();

                if (response.ok) {
                    resultDiv.className = 'result success';
                    resultDiv.textContent = `✅ 认证成功!\n\n${JSON.stringify(data, null, 2)}`;
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.textContent = `❌ 认证失败 (${response.status}):\n\n${JSON.stringify(data, null, 2)}`;
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = `❌ 请求失败: ${error.message}`;
            }
        }

        async function getModels() {
            const apiKey = document.getElementById('apiKey').value || '123456';
            const resultDiv = document.getElementById('models-result');

            resultDiv.className = 'result loading';
            resultDiv.textContent = '正在获取模型列表...';

            try {
                const response = await fetch(`${BASE_URL}/v1/models?key=${apiKey}`);
                const data = await response.json();

                if (response.ok) {
                    resultDiv.className = 'result success';
                    resultDiv.textContent = JSON.stringify(data, null, 2);
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.textContent = `获取失败 (${response.status}):\n\n${JSON.stringify(data, null, 2)}`;
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = `请求失败: ${error.message}`;
            }
        }

        async function testChat() {
            const apiKey = document.getElementById('apiKey').value || '123456';
            const model = document.getElementById('modelName').value;
            const content = document.getElementById('messageContent').value;
            const stream = document.getElementById('streamMode').checked;
            const resultDiv = document.getElementById('chat-result');

            resultDiv.className = 'result loading';
            resultDiv.textContent = '正在发送请求...';

            try {
                const response = await fetch(`${BASE_URL}/v1/chat/completions?key=${apiKey}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model,
                        messages: [{ role: 'user', content }],
                        stream
                    })
                });

                if (stream) {
                    resultDiv.className = 'result success';
                    resultDiv.textContent = '';
                    
                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    
                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        resultDiv.textContent += decoder.decode(value);
                    }
                } else {
                    const data = await response.json();
                    
                    if (response.ok) {
                        resultDiv.className = 'result success';
                        resultDiv.textContent = JSON.stringify(data, null, 2);
                    } else {
                        resultDiv.className = 'result error';
                        resultDiv.textContent = `请求失败 (${response.status}):\n\n${JSON.stringify(data, null, 2)}`;
                    }
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = `请求失败: ${error.message}`;
            }
        }

        async function runAllTests() {
            const resultsDiv = document.getElementById('test-results');
            resultsDiv.innerHTML = '';

            const tests = [
                { name: '健康检查', fn: testHealthCheck },
                { name: 'Bearer 认证', fn: testBearerAuth },
                { name: 'Query 参数认证', fn: testQueryAuth },
                { name: 'x-goog-api-key 认证', fn: testGoogAuth },
                { name: 'x-api-key 认证', fn: testAnthropicAuth },
                { name: '错误处理 - 无认证', fn: testNoAuth },
                { name: 'CORS 支持', fn: testCORS }
            ];

            for (const test of tests) {
                const row = document.createElement('div');
                row.className = 'test-row';
                row.innerHTML = `<span class="test-name">${test.name}</span><span class="test-status">运行中...</span>`;
                resultsDiv.appendChild(row);

                try {
                    const success = await test.fn();
                    row.className = `test-row ${success ? 'success' : 'error'}`;
                    row.innerHTML = `<span class="test-name">${test.name}</span><span class="test-status">${success ? '✓ 通过' : '✗ 失败'}</span>`;
                } catch {
                    row.className = 'test-row error';
                    row.innerHTML = `<span class="test-name">${test.name}</span><span class="test-status">✗ 失败</span>`;
                }
            }
        }

        async function testHealthCheck() {
            const response = await fetch(`${BASE_URL}/health`);
            return response.ok;
        }

        async function testBearerAuth() {
            const response = await fetch(`${BASE_URL}/health`, {
                headers: { 'Authorization': 'Bearer 123456' }
            });
            return response.ok;
        }

        async function testQueryAuth() {
            const response = await fetch(`${BASE_URL}/health?key=123456`);
            return response.ok;
        }

        async function testGoogAuth() {
            const response = await fetch(`${BASE_URL}/health`, {
                headers: { 'x-goog-api-key': '123456' }
            });
            return response.ok;
        }

        async function testAnthropicAuth() {
            const response = await fetch(`${BASE_URL}/health`, {
                headers: { 'x-api-key': '123456' }
            });
            return response.ok;
        }

        async function testNoAuth() {
            const response = await fetch(`${BASE_URL}/v1/chat/completions`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ model: 'test', messages: [] })
            });
            return response.status === 401;
        }

        async function testCORS() {
            const response = await fetch(`${BASE_URL}/v1/models`, {
                method: 'OPTIONS',
                headers: {
                    'Origin': BASE_URL,
                    'Access-Control-Request-Method': 'POST'
                }
            });
            return [200, 204].includes(response.status);
        }

        checkHealth();
    </script>
</body>
</html>
